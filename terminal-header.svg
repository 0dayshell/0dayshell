<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" width="100%" height="220">
<defs>
  <linearGradient id="winGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#000000"/>
  </linearGradient>
  <clipPath id="clipLine1">
    <rect x="0" y="0" width="0" height="60">
      <animate attributeName="width"
        values="0;489.6;489.6;0;0"
        keyTimes="0;0.2541;0.9919;0.9919;1"
        dur="6.14s" repeatCount="indefinite"/>
    </rect>
  </clipPath>
  <clipPath id="clipLine2">
    <rect x="0" y="0" width="0" height="40">
      <animate attributeName="width"
        values="0;0;475.2;475.2;0;0"
        keyTimes="0;0.3192;0.6417;0.9919;0.9919;1"
        dur="6.14s" repeatCount="indefinite"/>
    </rect>
  </clipPath>
</defs>

<rect x="0" y="0" width="1000" height="220" fill="#000000"/>
<rect x="20" y="10" width="960" height="200" rx="14" fill="url(#winGrad)" stroke="#00ff9c" stroke-opacity="0.35" stroke-width="1.5"/>
<rect x="20" y="10" width="960" height="34" rx="14" fill="#0a0f0c"/>
<rect x="20" y="30" width="960" height="14" fill="#0a0f0c"/>
<circle cx="45" cy="27" r="6" fill="#ff5f56"/>
<circle cx="65" cy="27" r="6" fill="#ffbd2e"/>
<circle cx="85" cy="27" r="6" fill="#27c93f"/>
<text x="500.0" y="32" text-anchor="middle" font-family="monospace" font-size="13" fill="#00ff9c" opacity="0.6">0dayshell — bash</text>

<g transform="translate(40,90)" clip-path="url(#clipLine1)">
  <text x="0" y="0" font-family="monospace" font-weight="bold" font-size="34" fill="#00ff9c">root@0dayshell:~$ whoami</text>
</g>

<g transform="translate(40,130)" clip-path="url(#clipLine2)">
  <text x="0" y="0" font-family="monospace" font-size="18" fill="#00ff9c" opacity="0.85">Security Researcher | Pentester | Bug Hunter</text>
</g>

<!-- single cursor block: moves with typing, blinks constantly -->
<rect y="63.5" width="14" height="30.6" fill="#00ff9c">
  <animate attributeName="x"
    values="40;529.6;529.6;40;515.2;515.2;40"
    keyTimes="0;0.2541;0.3192;0.3194;0.6417;0.9919;1"
    dur="6.14s" repeatCount="indefinite"/>
  <animate attributeName="y"
    values="63.5;63.5;110.2;110.2"
    keyTimes="0;0.3192;0.3194;1"
    dur="6.14s" repeatCount="indefinite"/>
  <animate attributeName="height"
    values="30.6;30.6;19.8;19.8"
    keyTimes="0;0.3192;0.3194;1"
    dur="6.14s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
</rect>

</svg>